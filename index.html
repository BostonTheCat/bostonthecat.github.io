<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rubbish Bear - Coming Soon</title>
    <style>
        /* 1. Root Setup */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; 
            width: 100%;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
        }

        /* 2. Content Container */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 3. The Logo Stack */
        .logo-wrapper {
            display: flex;
            flex-direction: column; /* Keeps text UNDER logo */
            align-items: center;    /* Centers them horizontally */
            justify-content: center;
            perspective: 1000px;
            width: 100%;
            max-height: 70vh;       /* Limits the total height of the image stack */
        }

        #rubbish-bear-img {
            display: block;
            width: auto;
            max-width: 80%;         /* Limits width on desktop/mobile */
            max-height: 45vh;       /* Shrinks if window height is too small */
            height: auto;
            pointer-events: none;
            transition: transform 0.1s ease-out;
            object-fit: contain;
        }

        #rubbish-bear-text {
            display: block;
            width: auto;
            max-width: 70%; 
            max-height: 15vh;       /* Shrinks if window height is too small */
            height: auto;
            margin-top: 20px;       /* Space between logo and text image */
            object-fit: contain;
        }

        h1 {
            margin-top: 20px;
            font-size: clamp(1rem, 3vh, 1.5rem); 
            color: #333;
            width: 100%;
        }

        /* 4. Copyright Notice */
        .copyright {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 0.7rem;
            color: #888;
            pointer-events: none;
            text-align: right;
        }
    </style>
</head>
<body>

    <div class="container" id="tracking-container">
        <div class="logo-wrapper">
            <img src="logoImage.png" alt="Rubbish Bear" id="rubbish-bear-img">
            <img src="logoText.png" alt="Rubbish Bear Text" id="rubbish-bear-text">
        </div>
        <h1>...is coming soon</h1>
    </div>

    <div class="copyright">
        &copy; 2026 Rubbish Bear. All rights reserved.
    </div>

    <script>
        const container = document.getElementById('tracking-container');
        const bearImage = document.getElementById('rubbish-bear-img');
        const tiltIntensity = 20;

        const handleMove = (e) => {
            const rect = document.body.getBoundingClientRect();
            
            const x = e.clientX || (e.touches && e.touches[0].clientX);
            const y = e.clientY || (e.touches && e.touches[0].clientY);

            if (x === undefined || y === undefined) return;

            const mouseX = x - (rect.left + rect.width / 2);
            const mouseY = y - (rect.top + rect.height / 2);

            const centerX = (mouseX / rect.width);
            const centerY = (mouseY / rect.height);

            const tiltX = -(centerY * tiltIntensity).toFixed(2);
            const tiltY = (centerX * tiltIntensity).toFixed(2);

            bearImage.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        };

        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', (e) => { handleMove(e); }, { passive: true });

        window.addEventListener('mouseleave', () => {
            bearImage.style.transform = 'rotateX(0deg) rotateY(0deg)';
        });
    </script>
</body>
</html>
